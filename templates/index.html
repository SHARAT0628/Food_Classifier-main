<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriVision: Automated Dietary Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Academic / Clinical Color Palette */
            --primary-blue: #0052CC;
            --primary-light: #E6F0FF;
            --accent-teal: #00A3BF;
            --bg-body: #F4F7F9;
            --bg-card: #FFFFFF;
            --text-main: #172B4D;
            --text-muted: #5E6C84;
            --border-light: #DFE1E6;
            --success-green: #36B37E;
            --shadow-sm: 0 4px 12px rgba(9, 30, 66, 0.05);
            --shadow-md: 0 8px 24px rgba(9, 30, 66, 0.08);
            --radius-main: 12px;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out;
        }

        /* Header / Nav */
        .header {
            background: var(--primary-blue);
            padding: 30px 40px;
            color: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-brand {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title svg {
            width: 28px;
            height: 28px;
            fill: #FFFFFF;
        }

        .header-subtitle {
            font-size: 13px;
            font-weight: 300;
            opacity: 0.85;
            margin-top: 4px;
        }

        /* Diagnostic Area */
        .diagnostic-zone {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Upload Container */
        .upload-container {
            width: 100%;
            max-width: 500px;
            border: 2px dashed var(--border-light);
            border-radius: var(--radius-main);
            background: #FAFBFC;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
        }

        .upload-container:hover, .upload-container.dragover {
            border-color: var(--primary-blue);
            background: var(--primary-light);
        }

        .upload-icon {
            font-size: 40px;
            color: var(--primary-blue);
            margin-bottom: 12px;
        }

        .upload-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .upload-subtext {
            font-size: 13px;
            color: var(--text-muted);
        }

        #file-input {
            display: none;
        }

        /* Image Preview Box */
        .preview-box {
            display: none;
            width: 100%;
            max-width: 500px;
            border-radius: var(--radius-main);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            position: relative;
            background: #000;
        }

        .preview-box img {
            width: 100%;
            height: 300px;
            object-fit: contain;
            display: block;
        }

        .reselect-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        /* Action Button */
        .action-btn {
            margin-top: 30px;
            background: var(--primary-blue);
            color: #FFF;
            border: none;
            border-radius: 6px;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(0, 82, 204, 0.3);
        }

        .action-btn:hover {
            background: #0047b3;
            transform: translateY(-2px);
        }

        .action-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #FFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .action-btn.loading .spinner { display: block; }
        .action-btn.loading span { display: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Results Panel */
        .results-panel {
            width: 100%;
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .results-panel.active {
            display: block;
        }
        
        .results-header {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .results-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .confidence-badge {
            background: var(--success-green);
            color: #FFF;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        /* Data Readout */
        .data-readout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .classification-result {
            background: var(--primary-light);
            border-left: 4px solid var(--primary-blue);
            padding: 20px;
            border-radius: 0 8px 8px 0;
        }

        .class-label {
            font-size: 12px;
            color: var(--primary-blue);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .class-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            text-transform: capitalize;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .metric-card {
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 16px;
            background: #FFF;
            text-align: center;
        }

        .metric-name {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        .metric-unit {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Error Label */
        .error-label {
            color: #DE350B;
            background: #FFEBE6;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 20px;
            display: none;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 24px 20px; }
            .diagnostic-zone { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="header-title">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    NutriVision
                </div>
                <div class="header-subtitle">Automated Dietary Assessment System</div>
            </div>
        </header>

        <!-- Main Body -->
        <div class="diagnostic-zone">
            
            <!-- Upload Area -->
            <div class="upload-container" id="upload-box" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">⎘</div>
                <div class="upload-text">Select Image for Analysis</div>
                <div class="upload-subtext">Supports JPEG, PNG, WEBP (Max 5MB)</div>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <!-- Preview Area -->
            <div class="preview-box" id="preview-box">
                <button class="reselect-btn" onclick="resetUI()">Change Input</button>
                <img id="image-preview" src="" alt="Input Specimen">
            </div>

            <!-- Error Output -->
            <div class="error-label" id="error-alert"></div>

            <!-- Analyze Button -->
            <button class="action-btn" id="analyze-btn" onclick="executeInference()">
                <span>Run CNN Inference</span>
                <div class="spinner"></div>
            </button>

            <!-- Analysis Results -->
            <div class="results-panel" id="results-panel">
                <div class="results-header">
                    <div class="results-title">Diagnostic Results</div>
                    <div class="confidence-badge" id="confidence-score">99.9% Conf</div>
                </div>

                <div class="data-readout">
                    <div class="classification-result">
                        <div class="class-label">Predicted Class</div>
                        <div class="class-value" id="result-class">Initializing...</div>
                    </div>

                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-name">Energy</div>
                            <div class="metric-value"><span id="val-cal">0</span><span class="metric-unit"> kcal</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-name">Proteins</div>
                            <div class="metric-value"><span id="val-pro">0</span><span class="metric-unit"> g</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-name">Carbs</div>
                            <div class="metric-value"><span id="val-carb">0</span><span class="metric-unit"> g</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-name">Fats</div>
                            <div class="metric-value"><span id="val-fat">0</span><span class="metric-unit"> g</span></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadBox = document.getElementById('upload-box');
        const previewBox = document.getElementById('preview-box');
        const imagePreview = document.getElementById('image-preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultsPanel = document.getElementById('results-panel');
        const errorAlert = document.getElementById('error-alert');

        // Drag and drop mechanics
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });
        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                mountImage();
            }
        });
        fileInput.addEventListener('change', mountImage);

        function mountImage() {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                uploadBox.style.display = 'none';
                previewBox.style.display = 'block';
                analyzeBtn.style.display = 'flex';
                resultsPanel.classList.remove('active');
                errorAlert.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function resetUI() {
            fileInput.value = '';
            uploadBox.style.display = 'block';
            previewBox.style.display = 'none';
            analyzeBtn.style.display = 'none';
            resultsPanel.classList.remove('active');
            errorAlert.style.display = 'none';
        }

        function executeInference() {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.classList.add('loading');
            analyzeBtn.disabled = true;
            errorAlert.style.display = 'none';

            const formData = new FormData();
            formData.append('image', file);

            fetch('/classify', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json().then(data => ({ status: res.status, body: data })))
            .then(({ status, body }) => {
                analyzeBtn.classList.remove('loading');
                analyzeBtn.disabled = false;

                if (status !== 200) {
                    throw new Error(body.error || 'Inference engine failed. Is the model loaded?');
                }

                // Inject Data
                document.getElementById('result-class').textContent = body.class.replace(/_/g, ' ');
                document.getElementById('confidence-score').textContent = body.confidence + '% Conf';
                
                // Animate Numbers
                animateNumber('val-cal', body.nutrients.calories || 0);
                animateNumber('val-pro', body.nutrients.protein || 0);
                animateNumber('val-carb', body.nutrients.carbs || 0);
                animateNumber('val-fat', body.nutrients.fat || 0);

                // Hide button, show results
                analyzeBtn.style.display = 'none';
                resultsPanel.classList.add('active');
            })
            .catch(err => {
                analyzeBtn.classList.remove('loading');
                analyzeBtn.disabled = false;
                errorAlert.textContent = err.message;
                errorAlert.style.display = 'block';
            });
        }

        function animateNumber(id, endVal) {
            const el = document.getElementById(id);
            const duration = 1000;
            let startVal = 0;
            const startTime = performance.now();

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease out expo
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                el.textContent = Math.round(startVal + (endVal - startVal) * easeOut);
                
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }
    </script>
</body>
</html>
